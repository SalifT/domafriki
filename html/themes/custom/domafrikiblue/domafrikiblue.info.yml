name: Dom Afriki Blue theme
description: Dom Afriki theme for Open social installations.
screenshot: screenshot.png
type: theme

base theme: socialbase

core: 8.x

libraries:
  - domafrikiblue/brand
  - domafrikiblue/site-footer

libraries-extend:
  socialbase/base:
    - domafrikiblue/base
  socialbase/alert:
    - domafrikiblue/alert
  socialbase/badge:
    - domafrikiblue/badge
  socialbase/button:
    - domafrikiblue/button
  socialbase/cards:
    - domafrikiblue/cards
  socialbase/form-controls:
    - domafrikiblue/form-controls
  socialbase/list:
    - domafrikiblue/list
  socialbase/spinner:
    - domafrikiblue/spinner
  # Extend molecules
  socialbase/block--informblock:
    - domafrikiblue/block--informblock
  socialbase/breadcrumb:
    - domafrikiblue/breadcrumb
  socialbase/dropdown:
    - domafrikiblue/dropdown
  socialbase/file:
      - domafrikiblue/file
  socialbase/form-elements:
    - domafrikiblue/form-elements
  socialbase/form--input-groups:
    - domafrikiblue/form--input-groups
  socialbase/like:
    - domafrikiblue/like
  # attach the datepicker stylesheet to all date fields
  core/drupal.date:
    - domafrikiblue/form--datepicker
  # extend the core datepicker with a stylesheet
  core/jquery.ui.datepicker:
    - domafrikiblue/form--timepicker
  socialbase/form--password:
    - domafrikiblue/form--password
  socialbase/pagination:
    - domafrikiblue/pagination
  socialbase/popover:
    - domafrikiblue/popover
  socialbase/nav-book:
    - domafrikiblue/nav-book
  socialbase/nav-tabs:
    - domafrikiblue/nav-tabs
  socialbase/navbar:
    - domafrikiblue/navbar
  socialbase/select2:
    - domafrikiblue/select2
  socialbase/teaser:
    - domafrikiblue/teaser
  socialbase/tour:
    - domafrikiblue/tour
  # Extend Organisms
  socialbase/comment:
    - domafrikiblue/comment
  socialbase/hero:
    - domafrikiblue/hero
  socialbase/message:
    - domafrikiblue/message
  socialbase/meta:
    - domafrikiblue/meta
  socialbase/modal:
    - domafrikiblue/modal
  socialbase/offcanvas:
    - domafrikiblue/offcanvas
  socialbase/stream:
    - domafrikiblue/stream
  socialbase/page-node:
    - domafrikiblue/page-node
  socialbase/layout:
    - domafrikiblue/layout
  # Custom Extends Organisms
  socialbase/admin-toolbar:
    - domafrikiblue/admin-toolbar

ckeditor_stylesheets:
  - assets/css/ckeditor.css


# This section is used by the contrib module, Component Libraries. It allows you
# to reference .twig files in your components/ directory.
component-libraries:
  base:
    paths:
      - components/01-base
  atoms:
    paths:
      - components/02-atoms
  molecules:
    paths:
      - components/03-molecules
  organisms:
    paths:
      - components/04-organisms
  templates:
    paths:
      - components/05-templates

regions:
  hidden: Hidden
  header: Header
  breadcrumb: Breadcrumb
  hero: Hero
  secondary_navigation: Secondary navigation
  content_top: Content top
  title: Page title
  content: Content
  complementary_top: Complementary top
  complementary_bottom: Complementary bottom
  content_bottom: Content bottom
  sidebar_first: Sidebar First
  sidebar_second: Sidebar Second
  footer: Footer
